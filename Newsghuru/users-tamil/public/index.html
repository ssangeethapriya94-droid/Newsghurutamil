<!DOCTYPE html>
<html lang="ta">
  <head>
    <meta charset="utf-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicontam.png" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Theme -->
    <meta name="theme-color" content="#14202b" />

    <!-- SEO -->
    <meta
      name="description"
      content="நியூஸ் குரு - தமிழ் செய்திகள், அரசியல், விளையாட்டு, சினிமா மற்றும் தொழில்நுட்ப செய்திகள்"
    />

    <meta
      name="keywords"
      content="தமிழ் செய்திகள், நியூஸ் குரு, பிரேக்கிங் நியூஸ், அரசியல், விளையாட்டு, சினிமா, தொழில்நுட்பம்"
    />

    <meta name="author" content="நியூஸ் குரு" />

    <!-- Open Graph -->
    <meta property="og:title" content="நியூஸ் குரு" />
    <meta
      property="og:description"
      content="சமீபத்திய தமிழ் செய்திகள், முக்கிய செய்திகள், அரசியல், சினிமா, விளையாட்டு மற்றும் பல."
    />
    <meta property="og:type" content="website" />

    <!-- Apple -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicontam.png" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Tamil Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">



    <!-- Title -->
    <title>நியூஸ் குரு | தமிழ் செய்திகள்</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background-color: #14202b;
        color: white;
        font-family: "Noto Sans Tamil", sans-serif;
        overflow-x: hidden;
      }

      a {
        text-decoration: none;
        color: inherit;
      }

      ul {
        list-style: none;
      }

      img {
        max-width: 100%;
        display: block;
      }

      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #1d2a36;
      }

      ::-webkit-scrollbar-thumb {
        background: #4b5a69;
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #667788;
      }

      #root {
        min-height: 100vh;
      }

      .loading-screen {
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #14202b;
        color: white;
      }

      .loading-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        text-align: center;
      }

      .loading-logo {
        width: 110px;
        height: 110px;
        object-fit: contain;
        animation: pulse 2s infinite ease-in-out;
      }

      .loading-spinner {
        width: 38px;
        height: 38px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-top: 4px solid #ff9800;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .loading-text {
        font-size: 19px;
        font-weight: 500;
        letter-spacing: 0.5px;
        color: #e2e8f0;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.9; }
        50% { transform: scale(1.06); opacity: 1; }
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- React Root -->
    <div id="root">
      <div class="loading-screen">
        <div class="loading-container">
          <img src="%PUBLIC_URL%/favicontam.png" alt="News Ghuru Logo" class="loading-logo" />
          <div class="loading-spinner"></div>
          <div class="loading-text">செய்திகள் ஏற்றப்படுகின்றன...</div>
        </div>
      </div>
    </div>
  </body>
</html>
